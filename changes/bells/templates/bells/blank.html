{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sandbells{% endblock title %}</title>

  <script src="{% static 'js/jquery.min.js' %}"></script>
  <script src="{% static 'js/d3.v3.min.js' %}"></script>
  <script src="{% static 'js/howler.min.js' %}"></script>
  <script src="{% static 'js/clock_analogue.js' %}"></script>
  <script src="{% static 'js/apps.js' %}"></script>

  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <style>
    body { margin:0; padding:0; background:white; color:black; font-family:sans-serif; }
    .frontpage_container { display:flex; justify-content:center; gap:20px; flex-wrap:nowrap; }
    .drumkit { display:flex; justify-content:center; gap:10px; margin:15px 0; }
    #midi-panel, .track-panel, [class*="midi"], [class*="Track"] {display: none !important; }

  </style>
</head>
<body>
    {% block fullscreen %}{% endblock fullscreen %}
    {% block menu %}{% endblock menu %}
    {% block display %}{% endblock display %}

</body>
</html>
