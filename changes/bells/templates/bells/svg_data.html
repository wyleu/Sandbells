<!-- This template is svg_data.html -->
<svg
    id="clock"
    height="890px"
    width="250px"
    viewBox="0 450 350 350"
    class="clockSvg shadow"
>
    <g id="posinfo" class="info">
        <!-- New Memory line - added at the top -->
        <text id="memory_label" x="50" y="990" fill="red" stroke="black" font-size="20">Memory:</text>
        <text id="memory_value" x="170" y="990" fill="red" stroke="black" font-size="19">0.0 / 0.0 MB (Peak: 0.0)</text>

        <text id="window_width" x="50" y="1020" fill="red" stroke="black" font-size="20">iframe W</text>
        <text id="window_width_value" x="170" y="1020" fill="red" stroke="black" font-size="20">10000</text>
        
        <text id="window_height" x="50" y="1050" fill="red" stroke="black" font-size="20">iframe H</text>
        <text id="window_height_value" x="170" y="1050" fill="red" stroke="black" font-size="20">10000</text>
        
        <text id="width" x="50" y="1080" fill="red" stroke="black" font-size="20">Width:>X</text>
        <text id="width_value" x="170" y="1080" fill="red" stroke="black" font-size="20">1000</text>
        
        <text id="height" x="50" y="1110" fill="red" stroke="black" font-size="20">Height:^Y</text>
        <text id="height_value" x="170" y="1110" fill="red" stroke="black" font-size="20">1000</text>
        
        <text id="ipaddr" x="50" y="1140" fill="red" stroke="black" font-size="20">IP Addr:</text>
        <text id="ipaddr_value" x="170" y="1140" fill="red" stroke="black" font-size="20">"{{IPAddr}}"</text>
        
        <text id="hostname_label" x="50" y="1170" fill="red" stroke="black" font-size="20">Host:</text>
        <text id="hostname_value" x="170" y="1170" fill="red" stroke="black" font-size="20">"{{hostname}}"</text>
        
        <text id="githash" x="50" y="1200" fill="red" stroke="black" font-size="20">Git:</text>
        <text id="githash_value" x="170" y="1200" fill="red" stroke="black" font-size="20">{{githash}}</text>
        
        <text id="sandbells" x="240" y="1230" fill="red" stroke="black" font-size="20">Sandbells</text>
    </g>

    <circle class="frame" cx="175" cy="175" r="145" stroke="black" stroke-width="8px"></circle>
    <g class="units">
        <line class="hour" x1="175" y1="175" x2="175" y2="75" stroke="#2c6d3a" stroke-width="6px"></line>
        <line class="minute" x1="175" y1="175" x2="175" y2="56" stroke="#9a4f05" stroke-width="4px"></line>
        <line class="second" x1="175" y1="175" x2="175" y2="43" stroke="#391d5b" stroke-width="3px"></line>
    </g>
    <circle cx="175" cy="175" r="10" stroke="black" fill="green"></circle>
    <g class="numbers"></g>
    <g class="marks"></g>
    <g class="digital">
        <text id="digital_time" x="20" y="420" fill="red" stroke="black" font-size="73">12:23:45</text>
    </g>
    <g class="digital_date">
        <text id="digital_date" x="20" y="470" fill="red" stroke="black" font-size="35">Sun 21 Jun</text>
    </g>
</svg>
