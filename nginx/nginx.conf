user sandbells;
worker_processes 1;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    accept_mutex off;
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings (kept for future)
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ##
    # Logging
    ##
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    ##
    # Upstream (gunicorn via unix socket)
    ##
    upstream app_server {
        server unix:/run/gunicorn.socket fail_timeout=0;
    }

    # Catch-all: close unknown hosts (anti-spoof)
    server {
        listen 80 default_server;
        return 444;
    }

    # Main Sandbells server
    server {
        listen 80 deferred;
        client_max_body_size 4G;

        # Accept both the .local name and common aliases / IP
        server_name sandbells.local sandbells2.local www.sandbells.local
                    localhost 127.0.0.1;

        keepalive_timeout 5;

        # Static files – served directly by nginx (after collectstatic)
        location /static/ {
            alias /var/www/sandbells/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Favicon / robots etc. can live here too
        location = /favicon.ico {
            alias /var/www/sandbells/static/favicon.ico;
            access_log off;
            log_not_found off;
        }

        # Everything else → Django via gunicorn
        location / {
            add_header X-Frame-Options "SAMEORIGIN";
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            try_files $uri @proxy_to_app;
        }

        location @proxy_to_app {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_pass http://app_server;
        }

        error_page 500 502 503 504 /500.html;
        location = /500.html {
            root /var/www/sandbells/static;
        }
    }
}
